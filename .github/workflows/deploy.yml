name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build -- --base=/my-portfolio/

      - name: Verify GitHub Pages is enabled
        if: env.PAGES_TOKEN == ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh api "repos/${{ github.repository }}/pages" > /dev/null 2>&1; then
            echo "::error title=GitHub Pages is not enabled::Go to Settings > Pages > Build and deployment > Source, then choose GitHub Actions. Or add a PAGES_TOKEN secret with Pages/admin write permission so this workflow can enable Pages automatically."
            exit 1
          fi

      - name: Configure GitHub Pages
        if: env.PAGES_TOKEN == ''
        uses: actions/configure-pages@v6

      - name: Enable and configure GitHub Pages
        if: env.PAGES_TOKEN != ''
        uses: actions/configure-pages@v6
        with:
          enablement: true
          token: ${{ secrets.PAGES_TOKEN }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
